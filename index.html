<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ammuuuuu ❤️</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e8,#ffe6f2,#fff0f5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow-x:hidden;
}

.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
max-width:600px;
margin:20px;
border:1px solid rgba(255,255,255,0.3);
animation:floatCard 3s ease-in-out infinite;
}
  
h1{
color:#ff4d6d;
font-size:2.2rem;
margin-bottom:20px;

text-shadow:0 0 15px #ff4d6d;
animation:glowText 2s infinite alternate;
}

@keyframes glowText{
from{
text-shadow:0 0 10px #ff4d6d;
}
to{
text-shadow:0 0 30px hotpink;
}
}

button{
padding:14px 28px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin:8px;
transition:0.3s;
box-shadow:0 8px 20px rgba(255,118,136,0.3);
}

button:hover{
transform:translateY(-3px) scale(1.05);
}

#msg{
margin-top:20px;
font-size:18px;
line-height:1.8;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes floatCard{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

@keyframes glow{
0%{
box-shadow:0 0 10px pink;
}
50%{
box-shadow:0 0 30px hotpink;
}
100%{
box-shadow:0 0 10px pink;
}
}
.hearts span{
position:fixed;
bottom:-50px;
font-size:25px;
animation:floatUp 10s linear infinite;
opacity:0.7;
pointer-events:none;
}

.hearts span:nth-child(1){left:10%;}
.hearts span:nth-child(2){left:30%;animation-delay:2s;}
.hearts span:nth-child(3){left:50%;animation-delay:4s;}
.hearts span:nth-child(4){left:70%;animation-delay:6s;}
.hearts span:nth-child(5){left:90%;animation-delay:8s;}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}  
</style>

</head>
<body>

<div class="card">

<h1>🥺 Dear Ammuuuuu...</h1>

<p>

Every moment without your smile feels incomplete,
thangapatteyyyyyy... 🥺🩵

<br><br>

I know I made mistakes...

<br><br>

I'm really sorry for hurting you... 😔💖

<br><br>

Can you give me one more chance...? 🌹❤️

</p>

<button onclick="showLove()">
💌 Open My Heart
</button>

<p id="msg"></p>

<div style="margin-top:20px;">

<h3>Will you forgive me? 🥺❤️</h3>

<button onclick="yesClicked()">
Yes 💖
</button>

<button id="noBtn"
onmouseover="runAway()"
onclick="runAway()">
No 😒
</button>
</div>

</div>

<script>

function yesClicked(){

document.getElementById("msg").innerHTML = `
<h2>🥹❤️ YAYYYYYY ❤️🥹</h2>

<p style="font-size:22px;line-height:1.8;">

💖 You just made my heart smile again 🌹

<br><br>

Ammuuuuu...

<br><br>

🥺🩵 Thank you for giving me another chance...

<br><br>

❤️ Forever grateful,

<br><br>

Your idiot 😅❤️

</p>
`;

for(let i=0;i<60;i++){

let emoji=document.createElement("div");

emoji.innerHTML=["🎉","❤️","💖","🌹","✨"][Math.floor(Math.random()*5)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="-50px";
emoji.style.fontSize=(20+Math.random()*30)+"px";
emoji.style.transition="all 5s linear";
emoji.style.pointerEvents="none";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="110vh";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},5000);

}

}

function moveButton(){

document.body.innerHTML = `
<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffe6ea;
font-family:Arial;
text-align:center;
">

<h1 style="font-size:90px;">😭💔</h1>

<h2>No ah...? 🥺</h2>

<p style="font-size:22px;">

Ammuuuuu...

<br><br>

My heart is crying now... 💔

<br><br>

Please press YES 😢🌹

</p>

<button onclick="location.reload()"
style="
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;">
Give Me Another Chance ❤️
</button>

</div>
`;

for(let i=0;i<60;i++){

let emoji=document.createElement("div");

const items=["😭","💔","🥺","😢"];

emoji.innerHTML=items[Math.floor(Math.random()*4)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="-50px";
emoji.style.fontSize=(20+Math.random()*40)+"px";
emoji.style.transition="all 5s linear";
emoji.style.pointerEvents="none";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="110vh";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},5000);

}

}
  
function runAway(){

const btn = document.getElementById("noBtn");

const maxX = window.innerWidth - btn.offsetWidth - 20;
const maxY = window.innerHeight - btn.offsetHeight - 20;

btn.style.position = "fixed";
btn.style.left = Math.random() * maxX + "px";
btn.style.top = Math.random() * maxY + "px";

}

function showLove(){

const music=document.getElementById("bgMusic");

if(music){
music.play().catch(()=>{});
}

document.getElementById("msg").innerHTML = `

<div style="display:flex;justify-content:center;">
<img src="harini.jpg.jpeg"
style="
width:280px;
height:280px;
object-fit:cover;
border-radius:50%;
box-shadow:0 0 30px #ff4d6d;
animation:pulse 2s infinite, glow 2s infinite;
">
</div>

<br>

<h2 style="color:#ff4d6d;">❤️ Ammuuuuu ❤️</h2>

<p>
🥺🩵 Every moment without your smile feels incomplete,
thangapatteyyyyyy... 🌹❤️

<br><br>

😔💖 I'm really sorry for hurting you...

<br><br>

✨ Your smile is still my favorite thing in this world...

<br><br>

🌹❤️ Can we create one more happy memory together...?
</p>

</div>


`;

for(let i=0;i<40;i++){

let emoji=document.createElement("div");

const items=["❤️","💖","💕","🌹","✨","🥺"];

emoji.innerHTML=items[Math.floor(Math.random()*items.length)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="100vh";
emoji.style.fontSize=(20+Math.random()*25)+"px";
emoji.style.pointerEvents="none";
emoji.style.zIndex="9999";
emoji.style.transition="all 4s linear";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="-100px";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},4000);

}

}

</script>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div class="hearts">
  <span>🩵</span>
  <span>💎</span>
  <span>🦋</span>
  <span>🌷</span>
  <span>😚</span>
</div>
  
</body>
</html>
