<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ammuuuuu ❤️</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow-x:hidden;
}

.card{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:550px;
margin:20px;
}

h1{
color:#ff4d6d;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

#msg{
margin-top:20px;
font-size:18px;
line-height:1.8;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

</style>

</head>
<body>

<div class="card">

<h1>🥺 Dear Ammuuuuu...</h1>

<p>

Every moment without your smile feels incomplete,
thangapatteyyyyyy... 🥺🩵

<br><br>

I know I made mistakes...

<br><br>

I'm really sorry for hurting you... 😔💖

<br><br>

Can you give me one more chance...? 🌹❤️

</p>

<button onclick="showLove()">
💌 Open My Heart
</button>

<p id="msg"></p>

<div style="margin-top:20px;">

<h3>Will you forgive me? 🥺❤️</h3>

<button onclick="yesClicked()">
Yes 💖
</button>

<button onclick="moveButton()">
No 😒
</button>

</div>

</div>

<script>

function yesClicked(){

document.getElementById("msg").innerHTML = `
<h2>🥹❤️ YAYYYYYY ❤️🥹</h2>

<p style="font-size:22px;line-height:1.8;">

💖 You just made my heart smile again 🌹

<br><br>

Ammuuuuu...

<br><br>

🥺🩵 Thank you for giving me another chance...

<br><br>

❤️ Forever grateful,

<br><br>

Your idiot 😅❤️

</p>
`;

for(let i=0;i<60;i++){

let emoji=document.createElement("div");

emoji.innerHTML=["🎉","❤️","💖","🌹","✨"][Math.floor(Math.random()*5)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="-50px";
emoji.style.fontSize=(20+Math.random()*30)+"px";
emoji.style.transition="all 5s linear";
emoji.style.pointerEvents="none";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="110vh";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},5000);

}

}

function moveButton(){

document.body.innerHTML = `
<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffe6ea;
font-family:Arial;
text-align:center;
">

<h1 style="font-size:90px;">😭💔</h1>

<h2>No ah...? 🥺</h2>

<p style="font-size:22px;">

Ammuuuuu...

<br><br>

My heart is crying now... 💔

<br><br>

Please press YES 😢🌹

</p>

<button onclick="location.reload()"
style="
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;">
Give Me Another Chance ❤️
</button>

</div>
`;

for(let i=0;i<60;i++){

let emoji=document.createElement("div");

const items=["😭","💔","🥺","😢"];

emoji.innerHTML=items[Math.floor(Math.random()*4)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="-50px";
emoji.style.fontSize=(20+Math.random()*40)+"px";
emoji.style.transition="all 5s linear";
emoji.style.pointerEvents="none";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="110vh";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},5000);

}

}

function showLove(){

const music=document.getElementById("bgMusic");

if(music){
music.play().catch(()=>{});
}

document.getElementById("msg").innerHTML = `

<div style="display:flex;justify-content:center;">
<img src="./harini.jpg.jpeg"
style="
width:280px;
height:280px;
object-fit:cover;
border-radius:50%;
box-shadow:0 0 30px #ff4d6d;
animation:pulse 2s infinite;
">
</div>

<br>

<h2 style="color:#ff4d6d;">❤️ Ammuuuuu ❤️</h2>

<p>
🥺🩵 Every moment without your smile feels incomplete,
thangapatteyyyyyy... 🌹❤️

<br><br>

😔💖 I'm really sorry for hurting you...

<br><br>

✨ Your smile is still my favorite thing in this world...

<br><br>

🌹❤️ Can we create one more happy memory together...?
</p>

</div>


`;

for(let i=0;i<40;i++){

let emoji=document.createElement("div");

const items=["❤️","💖","💕","🌹","✨","🥺"];

emoji.innerHTML=items[Math.floor(Math.random()*items.length)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="100vh";
emoji.style.fontSize=(20+Math.random()*25)+"px";
emoji.style.pointerEvents="none";
emoji.style.zIndex="9999";
emoji.style.transition="all 4s linear";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="-100px";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},4000);

}

}

</script>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
