<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ammuuuuu ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Playfair Display',sans-serif;
background:linear-gradient(135deg,#ffd6e8,#ffe6f2,#fff0f5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow-x:hidden;
}

.card{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

padding:45px;
border-radius:35px;

border:1px solid rgba(255,255,255,0.5);

box-shadow:
0 8px 32px rgba(255,105,180,0.25),
0 0 40px rgba(255,182,193,0.2);

max-width:650px;
margin:20px;

animation:
    letterOpen 1.5s ease,
    floatCard 4s ease-in-out infinite 1.5s;

position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
opacity:0.6;

background:linear-gradient(
45deg,
transparent,
rgba(255,255,255,0.4),
transparent
);

transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

@keyframes floatCard{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glowText{
from{
text-shadow:0 0 10px #ff4d6d;
}
to{
text-shadow:0 0 30px hotpink;
}
}
@keyframes letterOpen{
    0%{
        opacity:0;
        transform:perspective(1000px) rotateX(-20deg) scale(0.9);
    }

    100%{
        opacity:1;
        transform:perspective(1000px) rotateX(0deg) scale(1);
    }
}
  
h1{
font-family:'Montserrat',sans-serif;
font-size:2.8rem;
font-weight:800;
letter-spacing:2px;
color:#ff4d6d;
margin-bottom:20px;
text-shadow:0 0 15px #ff4d6d;
opacity:0;
animation:letterOpen 1.5s ease forwards;
}

p{
    font-family:'Playfair Display',serif;
    font-size:20px;
    line-height:1.9;
    color:#444;

    opacity:0;
    animation:fadeIn 2s ease forwards;
    animation-delay:1.2s;
}

.special{
font-family:'Montserrat',sans-serif;
font-weight:700;
color:#ff4d6d;
text-shadow:0 0 10px pink;
animation:glowText 2s infinite alternate;
}

img{
    border-radius:50%;

    box-shadow:
    0 0 20px pink,
    0 0 40px hotpink,
    0 0 60px rgba(255,105,180,0.5);

    animation:pulse 2s infinite, glow 2s infinite;
}

img:hover{
    transform:scale(1.08) rotate(2deg);
    transition:all 0.4s ease;
}
  
@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}
  
@keyframes glow{

    0%{
        box-shadow:
        0 0 20px pink,
        0 0 40px hotpink;
    }

    50%{
        box-shadow:
        0 0 40px pink,
        0 0 80px hotpink;
    }

    100%{
        box-shadow:
        0 0 20px pink,
        0 0 40px hotpink;
    }

}
@keyframes glowText{
from{
text-shadow:0 0 10px #ff4d6d;
}
to{
text-shadow:0 0 30px hotpink;
}
}
.sparkle{
    position:fixed;
    pointer-events:none;
    font-size:18px;
    z-index:9999;
    animation:sparkleFade 1s linear forwards;
}

@keyframes sparkleFade{
    0%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-30px) scale(0);
    }
}
button{
    font-family:'Montserrat',sans-serif;
    padding:15px 32px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#fff5f7,#ffe6eb,,#fff0f3);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 30px rgba(255,77,109,0.4);
}

button:hover{
    transform:translateY(-5px) scale(1.08);
}

#msg{
margin-top:20px;
font-size:18px;
line-height:1.8;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes floatCard{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

@keyframes glow{
0%{
box-shadow:0 0 10px pink;
}
50%{
box-shadow:0 0 30px hotpink;
}
100%{
box-shadow:0 0 10px pink;
}
}
.hearts span{
position:fixed;
bottom:-50px;
font-size:25px;
animation:floatUp 10s linear infinite;
opacity:0.7;
pointer-events:none;
}

.hearts span:nth-child(1){left:10%;}
.hearts span:nth-child(2){left:30%;animation-delay:2s;}
.hearts span:nth-child(3){left:50%;animation-delay:4s;}
.hearts span:nth-child(4){left:70%;animation-delay:6s;}
.hearts span:nth-child(5){left:90%;animation-delay:8s;}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}  
</style>

</head>
<body>

<div class="card">

<h1>🥺🫀 Dear <span class="special">Ammuuuuu</span>...</h1>

<p>

Every moment without your smile feels incomplete,

<span class="special">thangapatteyyyyyy....</span>

🥺🩵

<br><br>

🥺 <span class="special">I know I made mistakes...</span>
<br><br>
💔 And I regret every one of them...
<br><br>

<span class="special">I'm really sorry</span>
for hurting you... 🥺🫂

<br><br>

Can you give me

<span class="special">one more chance...?</span>

😚🫀🥺

</p>

<button onclick="showLove()">
💌 Open My Heart
</button>

<p id="msg"></p>

<div style="margin-top:20px;">

<h3>Will you forgive me? 🥺❤️</h3>

<button onclick="yesClicked()">
Yes 💖
</button>

<button id="noBtn"
onmouseover="runAway()"
onclick="runAway()">
No 😒
</button>
</div>

</div>

<script>

function yesClicked(){

    if(navigator.vibrate){
    navigator.vibrate([200,100,200,100,400]);
}
    
    for(let i=0;i<100;i++){

    let confetti=document.createElement("div");

    confetti.innerHTML=["💖","💕","💗","🌸","✨","💝","🩷"][Math.floor(Math.random()*7)];

    confetti.style.position="fixed";
    confetti.style.left="50%";
    confetti.style.top="50%";
    confetti.style.fontSize=(20+Math.random()*25)+"px";
    confetti.style.pointerEvents="none";
    confetti.style.zIndex="99999";

    document.body.appendChild(confetti);

    let x=(Math.random()-0.5)*1000;
    let y=(Math.random()-0.5)*800;

    confetti.animate([
        {
            transform:"translate(0,0) scale(1)",
            opacity:1
        },
        {
            transform:`translate(${x}px,${y}px) rotate(${Math.random()*720}deg) scale(0.5)`,
            opacity:0
        }
    ],{
        duration:2500,
        easing:"cubic-bezier(.17,.67,.83,.67)"
    });

    setTimeout(()=>{
        confetti.remove();
    },2500);
}
document.getElementById("msg").innerHTML = `
<h2>🥹🩵 YAYYYYYY 🩵🥹</h2>

<p style="font-size:22px;line-height:1.8;">

Ammuuuuu... 🥺🩵

<br><br>

Thank you for giving me another chance 🌷😚🫀

<br><br>

You just made my heart smile again 😩🩵

<br><br>

I promise I'll make you smile again 🫀😚

<br><br>

Forever grateful,
Your idiot 🥱🫀🌷

</p>

<p style="font-size:22px;line-height:1.8;">

💖 You just made my heart smile again 🌹

<br><br>

Ammuuuuu...

<br><br>

🥺🩵 Thank you for giving me another chance...

<br><br>

❤️ Forever grateful,

<br><br>

Your idiot 😅❤️

</p>
`;

setInterval(() => {

let emoji = document.createElement("div");

const emojis = ["😚","🩵","🫀","🦋","🌷","🦚"];

emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

emoji.style.position = "fixed";
emoji.style.left = Math.random()*100 + "vw";
emoji.style.top = "-50px";
emoji.style.fontSize = (15 + Math.random()*25) + "px";
emoji.style.pointerEvents = "none";
emoji.style.zIndex = "9999";

document.body.appendChild(emoji);

const duration = 4000 + Math.random()*3000;

emoji.animate(
[
{ transform:"translateY(-50px)", opacity:0 },
{ transform:"translateY(110vh)", opacity:1 }
],
{
duration:duration,
easing:"linear"
}
);

setTimeout(()=>{
emoji.remove();
}, duration);

}, 350);

}

function moveButton(){

document.body.innerHTML = `
<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffe6ea;
font-family:Arial;
text-align:center;
">

<h1 style="font-size:90px;">😭💔</h1>

<h2>No ah...? 🥺</h2>

<p style="font-size:22px;">

Ammuuuuu...

<br><br>

My heart is crying now... 💔

<br><br>

Please press YES 😢🌹

</p>

<button onclick="location.reload()"
style="
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;">
Give Me Another Chance ❤️
</button>

</div>
`;

for(let i=0;i<60;i++){

let emoji=document.createElement("div");

const items=["😭","💔","🥺","😢"];

emoji.innerHTML=items[Math.floor(Math.random()*4)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="-50px";
emoji.style.fontSize=(20+Math.random()*40)+"px";
emoji.style.transition="all 5s linear";
emoji.style.pointerEvents="none";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="110vh";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},5000);

}

}
  
function runAway(){

const btn = document.getElementById("noBtn");
const texts = [
"Please 🥺",
"Think Again 😭",
"One More Chance ❤️",
"Ammuuuuu 😢",
"Don't Break My Heart 💔"
];

btn.innerHTML =
texts[Math.floor(Math.random()*texts.length)];
const maxX = window.innerWidth - btn.offsetWidth - 20;
const maxY = window.innerHeight - btn.offsetHeight - 20;

btn.style.position = "fixed";
btn.style.left = Math.random() * maxX + "px";
btn.style.top = Math.random() * maxY + "px";

}

function showLove(){

if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
}

const music=document.getElementById("bgMusic");

if(music){
    music.play().catch(()=>{});
}

const text = `
🩵🫀Ammuuuu...

Every moment without your smile feels incomplete,
thangapatteyyyyyy... 😚🌏🫀

🥺 I'm really sorry for hurting you...

✨ Your smile is still my favorite thing in this world...

🌷 Can we create one more happy memory together...?
`;

let i = 0;

document.getElementById("msg").innerHTML = `
<div style="display:flex;justify-content:center;">
<img src="harini.jpg.jpeg"
style="
width:280px;
height:280px;
object-fit:cover;
border-radius:50%;
box-shadow:0 0 30px #ff4d6d;
animation:pulse 2s infinite, glow 2s infinite;
">
</div>

<br>

<h2 style="color:#ff4d6d;">🩵 Ammuuuu 🫀🧿😚</h2>

<p id="typingText"></p>
`;

const target = document.getElementById("typingText");

const typing = setInterval(() => {

if(i < text.length){
    target.innerHTML += text.charAt(i);
    i++;
}else{
    clearInterval(typing);
}

},40);

for(let i=0;i<40;i++){

let emoji=document.createElement("div");

const items=["❤️","💖","💕","🌹","✨","🥺"];

emoji.innerHTML=items[Math.floor(Math.random()*items.length)];

emoji.style.position="fixed";
emoji.style.left=Math.random()*100+"vw";
emoji.style.top="100vh";
emoji.style.fontSize=(20+Math.random()*25)+"px";
emoji.style.pointerEvents="none";
emoji.style.zIndex="9999";
emoji.style.transition="all 4s linear";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.style.top="-100px";
emoji.style.opacity="0";
},100);

setTimeout(()=>{
emoji.remove();
},4000);

}

}

  document.addEventListener("mousemove",(e)=>{

    const sparkle=document.createElement("div");

    sparkle.className="sparkle";

    sparkle.innerHTML=["✨","🩵","😚","🌷","🫀"][Math.floor(Math.random()*5)];

    sparkle.style.left=e.pageX+"px";
    sparkle.style.top=e.pageY+"px";

    document.body.appendChild(sparkle);

    setTimeout(()=>{
        sparkle.remove();
    },1000);

});
  
</script>

<audio id="bgMusic"  loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div class="hearts">
  <span>🩵</span>
  <span>💎</span>
  <span>🦋</span>
  <span>🌷</span>
  <span>😚</span>
</div>
  
</body>
</html>
