<!DOCTYPE html>
<html>
<head>
<title>Sorry ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    text-align:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:500px;
}

h1{
    color:#ff4d6d;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#msg{
    margin-top:20px;
    font-size:18px;
    color:#444;
}
</style>

</head>
<body>

<div class="card">
    <h1>🥺 I'm Sorry ❤️</h1>

    <p>
        I know you're upset with me...
        <br><br>
        But trust me,
        hurting you was never my intention.
    </p>

    <button onclick="showLove()">
        Tap Here ❤️
    </button>

    <p id="msg"></p>
</div>

<script>
function showLove(){
    document.getElementById("msg").innerHTML =
    "You are my favorite person ❤️<br><br>I am really sorry 🥺<br><br>Can we be okay again? 🌹";
}
</script>

</body>
</html>
